<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Projeto José Gilmar</title>
    <style>
        body { font-family: sans-serif; margin: 50px; line-height: 1.6; }
        .container { max-width: 600px; background: #f4f4f4; padding: 20px; border-radius: 10px; }
        .sucesso { color: green; font-weight: bold; margin-top: 20px; }
        input, button { padding: 10px; margin-top: 10px; }
        button { background-color: #007bff; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1>{{ titulo }}</h1>
        <p>Status: Servidor Django Operacional ✅</p>

        <hr>

        <h3>Formulário de Saudação:</h3>
        <form method="POST">
            {% csrf_token %}
            <label for="nome">Digite seu nome para testar o POST:</label><br>
            <input type="text" id="nome" name="nome" placeholder="Ex: José Gilmar" required>
            <button type="submit">Enviar via POST</button>
        </form>

        {% if mensagem %}
            <p class="sucesso">{{ mensagem }}</p>
        {% endif %}
    </div>
</body>
</html>
